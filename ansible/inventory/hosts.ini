# =============================================================================
# Ansible Inventory — TravelMemory MERN Application
# =============================================================================
# INSTRUCTIONS: Replace the placeholder IPs with the actual Terraform outputs.
#   - Run `terraform output` in the terraform/ directory to get the IPs.
#   - Update <WEB_SERVER_PUBLIC_IP> and <DB_SERVER_PRIVATE_IP> below.
#   - Update the path to your SSH private key (.pem file).
# =============================================================================

[webserver]
web ansible_host=<WEB_SERVER_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key-pair.pem

[dbserver]
db ansible_host=<DB_SERVER_PRIVATE_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key-pair.pem ansible_ssh_common_args='-o ProxyJump=ubuntu@<WEB_SERVER_PUBLIC_IP>'

[all:vars]
ansible_python_interpreter=/usr/bin/python3
